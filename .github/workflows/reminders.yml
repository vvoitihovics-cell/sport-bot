name: reminders

on:
  schedule:
    # Every 15 min between 03:00 and 21:00 UTC
    # Covers Europe/Riga 06:00-00:00 (summer) / 05:00-23:00 (winter)
    - cron: '*/15 3-21 * * *'
  workflow_dispatch:

concurrency:
  group: state-write
  cancel-in-progress: false

jobs:
  dispatch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - run: python scripts/dispatcher.py
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      - name: Commit state
        run: |
          git config user.name  "sport-bot"
          git config user.email "bot@sport.local"
          git add state/
          if git diff --cached --quiet; then
            echo "no state changes"
            exit 0
          fi
          for i in 1 2 3; do
            git pull --rebase origin main || true
            git commit -m "state: dispatcher tick $(date -u +%FT%TZ)" || exit 0
            if git push; then
              exit 0
            fi
            echo "push failed, retrying ($i/3)"
            sleep 5
          done
          exit 1
